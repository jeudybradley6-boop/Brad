{% extends 'base.html' %}

{% block title %}Supprimer Produit{% endblock %}

{% block content %}
<h2>Supprimer le Produit</h2>
<p>Voulez-vous vraiment supprimer le produit <strong>{{ produit.name }}</strong> ?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Oui, supprimer</button>
    <a href="{% url 'product_list' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
