{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<h2>Connexion</h2>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Se connecter</button>
</form>
<p class="mt-2">Pas encore de compte ? <a href="{% url 'signup' %}">S'inscrire</a></p>
{% endblock %}
