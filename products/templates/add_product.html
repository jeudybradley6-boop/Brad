{% extends 'base.html' %}

{% block title %}Ajouter Produit{% endblock %}

{% block content %}
<div class="container mt-4">

<h2>Ajouter un produit</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">
        Ajouter
    </button>
</form>

</div>
{% endblock %}
